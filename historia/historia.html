<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>História - Jujutsu Kaisen</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="historia.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Video Background -->
    <video class="video-background" autoplay muted loop>
        <source src="../assets/Video/VideoBackground.mp4" type="video/mp4">
    </video>

    <!-- Partículas de Energia Amaldiçoada -->
    <div class="particles-container">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Loading -->
    <div class="Loader">
        <div class="loader-container">
            <img class="sukuna-icon" src="../assets/icons/sukuna.svg" alt="Sukuna Loading">
        </div>
    </div>

    <!-- Header -->
    <header>
        <div class="navbar">
            <div class="navbar-menu">
                <img class="logo-img" src="../assets/images/Jujutsu-Kaisen-Logo-Header.png" alt="Logo Jujutsu Kaisen">
                <ul class="nav-list">
                    <li><a href="../index.html" class="nav-link">Inicio</a></li>
                    <li><a href="historia.html" class="nav-link">História</a></li>
                    <li><a href="../personagens/personagens.html" class="nav-link">Personagens</a></li>
                </ul>
            </div>
        </div>
    </header>

    <main>
        <div class="historia-section">
            <!-- Topo — seletor de arcos em linha horizontal -->
            <nav class="historia-wheel" aria-label="Selecionar arco">
                <div class="wheel-container">
                    <div class="wheel-item active" data-index="0" title="Arco 1">
                        <img src="../assets/images/Jujutsu-Kaisen-0-Logo.png" alt="Arco 1">
                    </div>
                    <div class="wheel-item" data-index="1" title="Arco 2">
                        <img src="../assets/images/Jujutsu-Kaisen-Logo.png" alt="Arco 2">
                    </div>
                    <div class="wheel-item" data-index="2" title="Arco 3">
                        <img src="../assets/images/Jujutsu-Kaisen-Shibuya-Logo.png" alt="Arco 3">
                    </div>
                    <div class="wheel-item" data-index="3" title="Arco 4">
                        <img src="../assets/images/Jujutsu-Kaisen-Abate-Logo.png" alt="Arco 4">
                    </div>
                </div>
            </nav>

            <!-- Conteúdo — card à esquerda, personagem à direita -->
            <div class="historia-body">
                <article class="historia-content">
                    <img class="historia-logo" id="historiaLogo" src="../assets/images/Jujutsu-Kaisen-0-Logo.png" alt="Logo do Arco">
                    <h2 class="historia-title" id="historiaTitle"></h2>
                    <div class="historia-text-container">
                        <p class="historia-text" id="historiaText">
                            Selecione um arco para ler mais...
                        </p>
                    </div>
                    <span class="historia-tag" id="historiaTag"></span>
                </article>

                <figure class="historia-image-center">
                    <img id="historiaImageMain" src="../assets/images/Yuta-Historia.png" alt="Arco da História">
                </figure>
            </div>
        </div>
    </main>

    <script src="../script.js"></script>
    <script src="historia.js"></script>
</body>
</html>
